<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="robots" content="noindex, nofollow">
<title>위베이프 스케줄 · 달력(테스트)</title>
<style>
  :root{
    --head:#2b2d42; --sat:#2f6fed; --sun:#e0384e;
    --line:#e7e8ee; --ink:#1e1f26; --muted:#8a8b93; --card:#ffffff;
    --off:#eef0f3; --offT:#5a5e66; --hol:#fce4ec; --holT:#c62828; --vac:#ffe0e4; --vacT:#b00020;
    --train:#fff1d6; --trainT:#7a4b00; --trip:#e3effb; --tripT:#245b8c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#eef0f4;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    -webkit-text-size-adjust:100%}
  .wrap{max-width:1200px;margin:0 auto;padding:14px 12px 48px}
  .head{position:sticky;top:0;z-index:7;background:#eef0f4;padding:8px 4px 8px;margin:-14px -4px 8px}
  h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.3px}
  .sub{font-size:12px;color:var(--muted);margin-top:2px}
  #monthSel{font-size:14px;font-weight:700;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#1e1f26}
  .names{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 2px}
  .chip{font-size:13.5px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);
    background:#fff;color:#333;cursor:pointer;font-weight:700;user-select:none}
  .chip.on{background:var(--head);color:#fff;border-color:var(--head)}
  .chip.all{color:#2f6fed}
  .chip.all.on{background:#2f6fed;color:#fff;border-color:#2f6fed}
  .hint{font-size:12px;color:var(--muted);margin:2px 2px 8px;text-align:right;display:none}
  .calwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal.dense{grid-template-columns:repeat(7,minmax(120px,1fr));min-width:850px}
  .wh{position:sticky;top:0;text-align:center;font-size:12.5px;font-weight:800;padding:7px 0;
    background:#dde1ea;border-radius:8px;color:#3a3d46}
  .wh.sun{color:var(--sun)} .wh.sat{color:var(--sat)}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:10px;min-height:58px;
    overflow:hidden;display:flex;flex-direction:column}
  .cell.blank{background:transparent;border:none;min-height:0}
  .cnum{font-size:13px;font-weight:800;padding:5px 8px;border-bottom:1px solid var(--line);
    background:#f6f7fb;display:flex;align-items:center;gap:4px}
  .cnum small{font-weight:700;font-size:10.5px;opacity:.7}
  .cnum .wn{margin-left:auto;font-size:10px;font-weight:700;color:#98a}
  .cell.sun .cnum{color:var(--sun);background:#fdeff1}
  .cell.sat .cnum{color:var(--sat);background:#eef4ff}
  .cbody{padding:5px 6px 7px;flex:1}
  .mini{font-size:13px;line-height:1.35;margin:3px 0;padding:4px 6px;border-radius:7px;border-left:4px solid #ccc}
  .mini .ms{font-size:10px;font-weight:800;color:#5a5e66;display:block;margin-bottom:1px}
  .mini b{font-weight:700;color:#17181e}
  .role{font-size:9px;font-weight:800;vertical-align:super;margin-left:1px}
  .op .role{color:#1b6b2f} .cl .role{color:#8a4b00}
  .coff{margin-top:6px;padding-top:5px;border-top:1px dashed var(--line);font-size:12px;color:var(--offT);line-height:1.55}
  .coff b{color:#444;font-weight:800;font-size:10px;margin-right:2px}
  .callhol{margin:auto;padding:12px 6px;text-align:center;color:var(--holT);font-weight:800;background:var(--hol);border-radius:8px;font-size:13px;width:100%}
  .cbig{margin:auto;padding:16px 6px;text-align:center;font-size:16px;font-weight:800;border-radius:9px;width:100%}
  .cbig .role{font-size:11px;margin-left:2px}
  .state{padding:48px 16px;text-align:center;color:var(--muted);font-size:14px;line-height:1.7}
  .state b{color:var(--ink)}
  .foot{margin:16px 4px 0;font-size:11.5px;color:var(--muted);text-align:center}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;color:#7a4b00;background:#fff3d6;
    border:1px solid #f0dca0;border-radius:999px;padding:2px 8px;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1 id="title">위베이프 스케줄 <span class="badge">달력 테스트</span></h1>
    <div class="sub" id="sub">불러오는 중…</div>
    <div style="margin:8px 0 2px"><select id="monthSel" style="display:none"></select></div>
    <div class="names" id="names"></div>
  </div>
  <div class="hint" id="hint">← 좌우로 넘겨서 전체 요일 보기 →</div>
  <div class="calwrap"><div class="cal" id="cal"></div></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxTkORMjTnG904crrghKNmEA2laN4WcVUpDItmbNuwArjRWlkpaZZOoxcFkTyHfBC1f/exec";
const PALETTE=['#ffe9ec','#fff3d6','#e3f2fd','#e8f5e9','#f3e5f5','#e0f7fa','#fff8e1','#efebe9','#ede7f6','#f1f8e9','#fde2ff','#e2fff3'];
const BORDER=['#ff9db0','#ffd166','#5aa9f0','#7ecb8a','#c58edb','#5fd0dd','#f0cf5a','#b09a8a','#a58ed6','#9bcf6a','#e58ad6','#5fd6a8'];
const DAYNAMES=['일','월','화','수','목','금','토'];

let EMPS=[], HEAD=[], WEEK=[], DAYCOLS=[], NAMECOL=1, YEAR=null, MONTH=null, TITLE='';
let COLIDX={}, CI=0, selected=null;

function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function short(full){ full=String(full||'').trim(); return full.length>=3 ? full.slice(1) : full; }
function colOf(n){ if(!(n in COLIDX)) COLIDX[n]=CI++; return COLIDX[n]; }
function cls(v){
  v=String(v||'').trim();
  if(v===''||v==='전휴무'||v==='휴가'||v==='훈련'||v==='출장') return {t:v||'off'};
  const m=v.match(/^(.+?)\((OP|CL)\)$/); const base=m?m[1].trim():v;
  return {t:'store',base:base,op:m?m[2]:''};
}
function weekdayOf(dc,dnum){ return WEEK[dc] || (YEAR&&MONTH? DAYNAMES[new Date(YEAR,MONTH-1,+dnum).getDay()] : ''); }

function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"') q=true; else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; } else cur+=c; }
  }
  row.push(cur); rows.push(row);
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}

function prep(rows){
  TITLE='위베이프 스케줄';
  outer: for(const r of rows){ for(const c of r){ if(String(c).trim()){ TITLE=String(c).trim(); break outer; } } }
  const hi=rows.findIndex(r=>r.some(c=>String(c).trim()==='성명'));
  if(hi<0) throw new Error('표 형식을 찾지 못했습니다.');
  HEAD=rows[hi].map(c=>String(c).trim());
  WEEK=(rows[hi+1]||[]).map(c=>String(c).trim());
  NAMECOL=HEAD.indexOf('성명');
  DAYCOLS=[]; HEAD.forEach((c,i)=>{ if(/^\d{1,2}$/.test(c)) DAYCOLS.push(i); });
  EMPS=rows.slice(hi+2).filter(r=>String(r[NAMECOL]||'').trim()!=='')
    .map(r=>({ full:String(r[NAMECOL]).trim(), short:short(r[NAMECOL]), row:r }));
  const mt=TITLE.match(/(\d{4})\D+(\d{1,2})/);
  YEAR=mt?+mt[1]:null; MONTH=mt?+mt[2]:null;
  COLIDX={}; CI=0;
  EMPS.forEach(e=>DAYCOLS.forEach(dc=>{ const k=cls(e.row[dc]); if(k.t==='store') colOf(k.base); }));
}

function renderChips(){
  let h='<span class="chip all'+(selected===null?' on':'')+'" onclick="pick(-1)">전체</span>';
  h+=EMPS.map((e,i)=>`<span class="chip${selected===e.full?' on':''}" onclick="pick(${i})">${esc(e.short)}</span>`).join('');
  document.getElementById('names').innerHTML=h;
}
function pick(i){ selected = (i<0)?null:EMPS[i].full; renderChips(); renderCal(); updateSub(); window.scrollTo({top:0,behavior:'smooth'}); }

function bigChip(k){
  if(k.t==='store'){ const i=colOf(k.base); const bg=PALETTE[i%PALETTE.length], bd=BORDER[i%BORDER.length];
    return `<div class="cbig" style="background:${bg};border:2px solid ${bd}">${esc(k.base)}${k.op?`<span class="role">${k.op}</span>`:''}</div>`; }
  const map={'off':['var(--off)','var(--offT)','휴무'],'전휴무':['var(--hol)','var(--holT)','전휴무'],
    '휴가':['var(--vac)','var(--vacT)','휴가'],'훈련':['var(--train)','var(--trainT)','훈련'],'출장':['var(--trip)','var(--tripT)','출장']};
  const m=map[k.t]||map['off'];
  return `<div class="cbig" style="background:${m[0]};color:${m[1]}">${m[2]}</div>`;
}

function dayCellBody(dc){
  if(selected){
    const emp=EMPS.find(e=>e.full===selected);
    return bigChip(cls(emp?emp.row[dc]:''));
  }
  const byStore={}, off=[], vac=[], trip=[];
  EMPS.forEach(e=>{ const k=cls(e.row[dc]);
    if(k.t==='store'){ (byStore[k.base]=byStore[k.base]||[]).push({s:e.short,op:k.op}); }
    else if(k.t==='off'||k.t==='전휴무'){ off.push(e.short); }
    else if(k.t==='휴가'||k.t==='훈련'){ vac.push(e.short); }
    else if(k.t==='출장'){ trip.push(e.short); }
  });
  const working=Object.values(byStore).reduce((a,v)=>a+v.length,0);
  if(working===0) return '<div class="callhol">전 매장 휴무</div>';
  let inner='';
  Object.keys(byStore).sort((a,b)=>colOf(a)-colOf(b)).forEach(sn=>{
    const i=colOf(sn), bg=PALETTE[i%PALETTE.length], bd=BORDER[i%BORDER.length];
    const ppl=byStore[sn].map(p=>esc(p.s)+(p.op?`<span class="role ${p.op==='OP'?'op':'cl'}">${p.op}</span>`:'')).join(', ');
    inner+=`<div class="mini" style="background:${bg};border-left-color:${bd}"><span class="ms">${esc(sn)}</span><b>${ppl}</b></div>`;
  });
  let ex='';
  if(off.length) ex+=`<div class="coff"><b>휴무</b>${off.map(esc).join(' ')}</div>`;
  if(vac.length) ex+=`<div class="coff"><b>휴가</b>${vac.map(esc).join(' ')}</div>`;
  if(trip.length) ex+=`<div class="coff"><b>출장</b>${trip.map(esc).join(' ')}</div>`;
  return inner+ex;
}

function renderCal(){
  const cal=document.getElementById('cal');
  cal.className='cal'+(selected?'':' dense');
  document.getElementById('hint').style.display = selected? 'none':'';
  let firstDow=0;
  if(DAYCOLS.length){ const d0=DAYCOLS[0]; const w=weekdayOf(d0,HEAD[d0]); const idx=DAYNAMES.indexOf(w); firstDow=idx<0?0:idx; }
  let html='';
  DAYNAMES.forEach((w,i)=>{ html+=`<div class="wh ${i===0?'sun':i===6?'sat':''}">${w}</div>`; });
  for(let b=0;b<firstDow;b++) html+='<div class="cell blank"></div>';
  DAYCOLS.forEach(dc=>{
    const dnum=HEAD[dc], wk=weekdayOf(dc,dnum), cls2=wk==='토'?'sat':wk==='일'?'sun':'';
    const body=dayCellBody(dc);
    html+=`<div class="cell ${cls2}"><div class="cnum">${esc(dnum)}<small>${esc(wk)}</small></div><div class="cbody">${body}</div></div>`;
  });
  const total=firstDow+DAYCOLS.length, trail=(7-total%7)%7;
  for(let t=0;t<trail;t++) html+='<div class="cell blank"></div>';
  cal.innerHTML=html;
}

function updateSub(){
  const now=new Date(), p=n=>String(n).padStart(2,'0');
  const stamp=`열람 ${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;
  const emp=selected?EMPS.find(e=>e.full===selected):null;
  document.getElementById('sub').textContent=(emp? `${emp.short} 근무표` : '주간 달력 · 날짜별 근무')+' · '+stamp;
}

async function loadMonth(m){
  try{
    selected=null;
    const res=await fetch(WEBAPP_URL+'?month='+encodeURIComponent(m||'')+'&t='+Date.now());
    if(!res.ok) throw new Error('데이터를 불러오지 못했습니다 ('+res.status+').');
    prep(parseCSV(await res.text()));
    document.getElementById('title').innerHTML=esc(TITLE)+' <span class="badge">달력 테스트</span>';
    renderChips(); renderCal(); updateSub();
    document.getElementById('foot').textContent='이름을 누르면 그 사람만 달력에 표시됩니다. 위에서 달을 바꾸면 지난달도 볼 수 있어요. 테스트용 페이지입니다.';
  }catch(e){ document.getElementById('cal').innerHTML=`<div class="state" style="grid-column:1/-1"><b>불러오기 오류</b><br>${esc(e.message||e)}</div>`; document.getElementById('sub').textContent=''; }
}
async function load(){
  try{
    const lr=await fetch(WEBAPP_URL+'?mode=list&t='+Date.now());
    let months=[]; try{ months=JSON.parse(await lr.text()); }catch(_){}
    const sel=document.getElementById('monthSel');
    if(months && months.length){
      sel.innerHTML=months.map(m=>`<option value="${m}">${esc(m.replace('-','년 ')+'월')}</option>`).join('');
      sel.style.display='';
      sel.onchange=()=>loadMonth(sel.value);
      await loadMonth(months[0]);
    }else{
      sel.style.display='none';
      await loadMonth('');
    }
  }catch(e){ document.getElementById('cal').innerHTML=`<div class="state" style="grid-column:1/-1"><b>연결 오류</b><br>${esc(e.message||e)}</div>`; }
}
load();
</script>
</body>
</html>
